<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWI®</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk', sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* INTRO FADE */

body{
animation:fadeIn 1.5s ease forwards;
opacity:0;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* LOGO FIXE */

.logo{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
height:30px;
z-index:1000;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateX(-50%) translateY(0);}
50%{transform:translateX(-50%) translateY(-8px);}
}

/* SHOP GRID */

.shop{
padding:140px 8% 120px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:120px 80px;
}

/* CARD */

.card{
position:relative;
text-align:center;
opacity:0;
transform:translateY(60px);
transition:1s ease;
}

.card.visible{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
max-width:380px;
transition:0.6s cubic-bezier(.2,.8,.2,1);
}

.card:hover img{
transform:scale(1.08) rotate(-1deg);
}

/* BOUTON */

.card button{
margin-top:25px;
padding:12px 30px;
background:transparent;
border:1px solid white;
color:white;
letter-spacing:3px;
font-size:12px;
cursor:pointer;
transition:0.4s;
position:relative;
overflow:hidden;
}

.card button::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:0%;
background:white;
z-index:-1;
transition:0.4s;
}

.card button:hover::before{
width:100%;
}

.card button:hover{
color:black;
}

/* FOOTER */

footer{
text-align:center;
padding:100px 20px;
font-size:13px;
letter-spacing:4px;
opacity:0.5;
animation:fadeUp 1.5s ease forwards;
animation-delay:1s;
opacity:0;
}

@keyframes fadeUp{
to{opacity:0.5; transform:translateY(0);}
from{opacity:0; transform:translateY(40px);}
}

/* MOBILE */

@media(max-width:700px){
.shop{
gap:80px;
}
}

</style>
</head>

<body>

<img src="pawi.png" class="logo">

<section class="shop">

<div class="card">
<img src="pawitshirt.png">
<button onclick="buy()">SHOP</button>
</div>

<div class="card">
<img src="pawipull.png">
<button onclick="buy()">SHOP</button>
</div>

<div class="card">
<img src="pawiveste.png">
<button onclick="buy()">SHOP</button>
</div>

<div class="card">
<img src="pawishort.png">
<button onclick="buy()">SHOP</button>
</div>

</section>

<footer>
PAWI® - Tout droits réservés
</footer>

<script>

/* Animation au scroll */

const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('visible');
}
});
},{threshold:0.2});

cards.forEach(card=>{
observer.observe(card);
});

function buy(){
alert("Produit ajouté ✔");
}

</script>

</body>
</html>
